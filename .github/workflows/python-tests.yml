name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Python 3.7 requires a completely different setup because it is very EOL.
        include:
          - python-version: "3.10"
            uv-sync-flags: "--all-extras"
            mypy-flags: ""
          - python-version: "3.11"
            uv-sync-flags: "--all-extras"
            mypy-flags: ""
          - python-version: "3.12"
            uv-sync-flags: "--all-extras"
            mypy-flags: ""
          - python-version: "3.13"
            uv-sync-flags: "--all-extras"
            mypy-flags: ""
          - python-version: "3.14"
            uv-sync-flags: "--all-extras"
            mypy-flags: ""
          - python-version: "3.8"
            uv-sync-flags: ""
            mypy-flags: "--exclude '/mcp/'"
          - python-version: "3.9"
            uv-sync-flags: ""
            mypy-flags: "--exclude '/mcp/'"
    steps:
      - uses: actions/checkout@v4
      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project
        run: |
          uv sync --locked ${{ matrix.uv-sync-flags }} --dev
      - name: Run unit tests
        run: |
          uv run pytest
      - name: Mypy Type Check
        run: |
          uv run mypy --check-untyped-defs ${{ matrix.mypy-flags }} ./src/
